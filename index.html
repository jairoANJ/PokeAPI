<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Pokemon API</title>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <header class="bg-slate-900 text-center p-8 border-b border-slate-100">
      <h1 class="text-5xl font-extrabold text-red-500 uppercase pb-6">
        API Rest Pokedex
      </h1>

      <button
        id="btnCargar"
        class="bg-red-600 hover:bg-red-800 text-white font-bold py-2 px-8 text-lg cursor-pointer transition-colors">
        Iniciar Escaneo
      </button>
    </header>

    <main>
      <div
        id="poke-contenedor"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"></div>
    </main>

    <!--MODAL PARA CADA TARJETA EN LA MISMA PATNTALLA-->
    <div
      id="modalPokemon"
      class="fixed inset-0 bg-black/70 hidden justify-center items-center">
      <div class="bg-slate-800 p-6 rounded-lg w-96 relative">
        <button
          id="btn_cerrar_Modal"
          class="absolute top-2 right-3 text-white text-2xl cursor-pointer">
          ✖
        </button>

        <div id="contenidoModal"></div>
      </div>
    </div>
    <!--FIN DEL MODAL-->

    <script src="pokeAPI.js"></script>
  </body>
</html>
